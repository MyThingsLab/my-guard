name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # mythings-core is a sibling repo, not on PyPI — pull it from the same owner.
      - name: Install mythings-core
        run: pip install "mythings-core @ git+https://github.com/${{ github.repository_owner }}/mythings-core@main"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest
